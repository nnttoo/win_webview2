<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <link rel="stylesheet" href="/bootstrap.css?v=9">
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>

</head>

<body>
    <div class="container">
        <h4>Open File Dialog</h4>
        <div class="input-group mb-3">
            <input id="ipt_dialog" type="text" class="form-control" placeholder="Recipient's username"
                aria-label="Recipient's username" aria-describedby="button-addon2">
            <button id="openfdialog" class="btn btn-outline-secondary" type="button">Open File Dialog</button>
        </div>

        <h4>Open Folder Dialog</h4>
        <div class="input-group mb-3">
            <input id="ipt_dialog_folder" type="text" class="form-control" placeholder="Recipient's username"
                aria-label="Recipient's username" aria-describedby="button-addon2">
            <button id="openfolder" class="btn btn-outline-secondary" type="button">Open File Dialog</button>
        </div>

        <video autoplay="true" style="display: none;" id="videoElement"></video>
        
        <h4>Control Window</h4>
        <button id="close"  class="btn btn-outline-secondary" type="button">Close Window Manually</button>
        <button id="move" class="btn btn-outline-secondary" type="button">Move Window</button>
        <button id="resize" class="btn btn-outline-secondary" type="button">Resize Window</button>
        <button id="max" class="btn btn-outline-secondary" type="button">Maximize Window</button>
        <button id="min" class="btn btn-outline-secondary" type="button">Minimize Window</button>
        <button id="testget" class="btn btn-outline-secondary" type="button">Test Virtual Dir</button>
        <button id="testcamera" class="btn btn-outline-secondary" type="button">Test Camera</button>

    </div>

    <script src="/app_browser.js"></script>
</body>

</html>
